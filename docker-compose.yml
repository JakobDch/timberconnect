services:
  timberconnect-viewer:
    build:
      context: ./timberconnect-viewer
      dockerfile: Dockerfile
    restart: unless-stopped
    expose: ["80"]
    networks:
      solid-dataspace:
        aliases:
          - solid-dataspace-dev-timberconnect-viewer

  timberconnect-rml-converter:
    build:
      context: ./timberconnect-rml-converter
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SOLID_POD_URL: https://tmdt-solid-community-server.de/epcisrepository
      SOLID_ACCESS_TOKEN: ${SOLID_ACCESS_TOKEN:-}
      # Live Catalog at solid-dataspace-timberconnect.tmdt.info
      CATALOG_API_URL: https://solid-dataspace-timberconnect.tmdt.info
      CATALOG_LDP_URL: https://solid-dataspace-timberconnect.tmdt.info/dace/catalog/ds/
      CATALOG_DEFAULT_PUBLISHER: "TimberConnect RML Converter"
      CATALOG_DEFAULT_CONTACT: ${CATALOG_DEFAULT_CONTACT:-timberconnect@2050.de}
      CATALOG_REGISTRATION_ENABLED: ${CATALOG_REGISTRATION_ENABLED:-true}
    expose: ["8001"]
    networks:
      solid-dataspace:
        aliases:
          - solid-dataspace-dev-rml-converter

  timberconnect-agent:
    build:
      context: ./timberconnect-agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TC_AGENT_OLLAMA_BASE_URL: "http://132.195.160.35:11434"
      TC_AGENT_OLLAMA_MODEL: "llama3.3:70b"
      TC_AGENT_DEFAULT_LLM_PROVIDER: "ollama"
    expose: ["8002"]
    networks:
      solid-dataspace:
        aliases:
          - solid-dataspace-dev-agent

  caddy:
    image: caddy:2
    container_name: reverse-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    networks:
      solid-dataspace:
        aliases:
          - solid-dataspace-dev-caddy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - timberconnect-viewer
      - timberconnect-rml-converter
      - timberconnect-agent

volumes:
  caddy_data:
  caddy_config:

networks:
  solid-dataspace:
    external: true
    name: solid-dataspace
