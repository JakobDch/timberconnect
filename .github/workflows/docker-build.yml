name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-viewer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push viewer
        uses: docker/build-push-action@v5
        with:
          context: ./timberconnect-viewer
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/timberconnect-viewer:latest

  build-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push agent
        uses: docker/build-push-action@v5
        with:
          context: ./timberconnect-agent
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/timberconnect-agent:latest

  build-converter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push converter
        uses: docker/build-push-action@v5
        with:
          context: ./timberconnect-rml-converter
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/timberconnect-rml-converter:latest
