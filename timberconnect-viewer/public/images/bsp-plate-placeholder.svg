<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f9f4"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574"/>
      <stop offset="50%" style="stop-color:#c4956a"/>
      <stop offset="100%" style="stop-color:#b8895e"/>
    </linearGradient>
    <linearGradient id="woodGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4956a"/>
      <stop offset="50%" style="stop-color:#b8895e"/>
      <stop offset="100%" style="stop-color:#a87d52"/>
    </linearGradient>
  </defs>

  <!-- BSP Plate - 3D isometric view -->
  <g transform="translate(100, 80)">
    <!-- Top face -->
    <path d="M100,0 L200,50 L100,100 L0,50 Z" fill="url(#woodGrad)" stroke="#8B7355" stroke-width="1"/>

    <!-- Wood grain lines on top -->
    <line x1="20" y1="50" x2="180" y2="50" stroke="#a87d52" stroke-width="0.5" opacity="0.5"/>
    <line x1="30" y1="40" x2="170" y2="60" stroke="#a87d52" stroke-width="0.5" opacity="0.4"/>
    <line x1="30" y1="60" x2="170" y2="40" stroke="#a87d52" stroke-width="0.5" opacity="0.4"/>

    <!-- Layer lines (showing laminated structure) -->
    <line x1="40" y1="35" x2="40" y2="65" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
    <line x1="80" y1="25" x2="80" y2="75" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
    <line x1="120" y1="25" x2="120" y2="75" stroke="#8B7355" stroke-width="1" opacity="0.3"/>
    <line x1="160" y1="35" x2="160" y2="65" stroke="#8B7355" stroke-width="1" opacity="0.3"/>

    <!-- Right face -->
    <path d="M200,50 L200,130 L100,180 L100,100 Z" fill="url(#woodGrad2)" stroke="#8B7355" stroke-width="1"/>

    <!-- Layer stripes on side (showing cross-lamination) -->
    <rect x="100" y="100" width="100" height="16" fill="#c4956a" transform="skewY(26.57)" opacity="0.8"/>
    <rect x="100" y="116" width="100" height="16" fill="#b8895e" transform="skewY(26.57)" opacity="0.8"/>
    <rect x="100" y="132" width="100" height="16" fill="#c4956a" transform="skewY(26.57)" opacity="0.8"/>
    <rect x="100" y="148" width="100" height="16" fill="#b8895e" transform="skewY(26.57)" opacity="0.8"/>
    <rect x="100" y="164" width="100" height="16" fill="#c4956a" transform="skewY(26.57)" opacity="0.8"/>

    <!-- Left face -->
    <path d="M0,50 L100,100 L100,180 L0,130 Z" fill="#a87d52" stroke="#8B7355" stroke-width="1"/>

    <!-- Layer stripes on left side -->
    <rect x="0" y="50" width="100" height="16" fill="#b8895e" transform="skewY(-26.57)" opacity="0.8"/>
    <rect x="0" y="66" width="100" height="16" fill="#a87d52" transform="skewY(-26.57)" opacity="0.8"/>
    <rect x="0" y="82" width="100" height="16" fill="#b8895e" transform="skewY(-26.57)" opacity="0.8"/>
    <rect x="0" y="98" width="100" height="16" fill="#a87d52" transform="skewY(-26.57)" opacity="0.8"/>
    <rect x="0" y="114" width="100" height="16" fill="#b8895e" transform="skewY(-26.57)" opacity="0.8"/>
  </g>

  <!-- CLT/BSP Label -->
  <text x="200" y="270" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#2d9660">
    Brettsperrholz (BSP)
  </text>
</svg>
