server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve timberconnect app at /timberconnect/
    location /timberconnect/ {
        alias /usr/share/nginx/html/;
        index index.html;

        # For SPA routing: serve index.html for any non-file requests
        try_files $uri $uri/ /timberconnect/index.html;
    }

    # Cache static assets
    location ~* ^/timberconnect/(.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot))$ {
        alias /usr/share/nginx/html/$1;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Redirect root to /timberconnect/
    location = / {
        return 301 /timberconnect/;
    }

    # Catch-all: redirect to timberconnect
    location / {
        return 301 /timberconnect/;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
